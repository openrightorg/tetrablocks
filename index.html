<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Clone</title>
  <style>
    body { margin: 0; background: #222; color: #eee; font-family: sans-serif; }
    canvas { background: #111; display: block; margin: 0 auto; }
    #info { text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <canvas id="game" width="300" height="600"></canvas>
  <div id="info">
    <button id="startBtn">Start Game</button>
    <span id="score" style="margin-left:20px;">Score: 0</span>
    <span id="next" style="margin-left:20px;">Next:</span>
  </div>
  <script>
/* Tetris Clone – minimal but functional implementation */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const grid = 30; // cell size
const rows = 20;
const cols = 10;
const playfield = Array.from({ length: rows }, () => Array(cols).fill(0));

const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1], [1, 1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};
const SHAPE_KEYS = Object.keys(SHAPES);

function randomShape() {
  const key = SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)];
  return { shape: SHAPES[key], key, rotation: 0 };
}

let currentPiece = randomShape();
let nextPiece = randomShape();
let pos = { x: 3, y: 0 };
let dropInterval = 800;
let lastDrop = Date.now();
let score = 0;

function drawCell(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * grid, y * grid, grid, grid);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(x * grid, y * grid, grid, grid);
}

function drawField() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // draw playfield
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (playfield[y][x]) {
        drawCell(x, y, '#888');
      }
    }
  }
  // draw current piece
  const matrix = currentPiece.shape;
  for (let y = 0; y < matrix.length; y++) {
    for (let x = 0; x < matrix[y].length; x++) {
      if (matrix[y][x]) {
        drawCell(pos.x + x, pos.y + y, '#f00');
      }
    }
  }
}

function collide(field, piece, offsetX, offsetY) {
  const m = piece.shape;
  for (let y = 0; y < m.length; y++) {
    for (let x = 0; x < m[y].length; x++) {
      if (!m[y][x]) continue;
      const newX = offsetX + x;
      const newY = offsetY + y;
      if (newX < 0 || newX >= cols || newY >= rows) return true;
      if (newY >= 0 && field[newY][newX]) return true;
    }
  }
  return false;
}

function merge(field, piece) {
  const m = piece.shape;
  for (let y = 0; y < m.length; y++) {
    for (let x = 0; x < m[y].length; x++) {
      if (m[y][x]) {
        field[pos.y + y][pos.x + x] = 1;
      }
    }
  }
}

function rotate(matrix) {
  const rows = matrix.length;
  const cols = matrix[0].length;
  const result = Array.from({ length: cols }, () => Array(rows).fill(0));
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      result[x][rows - 1 - y] = matrix[y][x];
    }
  }
  return result;
}

function rotatePiece() {
  const rotated = rotate(currentPiece.shape);
  const oldPos = { ...pos };
  const oldShape = currentPiece.shape;
  currentPiece.shape = rotated;
  if (collide(playfield, currentPiece, pos.x, pos.y)) {
    // try wall kick
    if (!collide(playfield, currentPiece, pos.x + 1, pos.y)) {
      pos.x += 1;
    } else if (!collide(playfield, currentPiece, pos.x - 1, pos.y)) {
      pos.x -= 1;
    } else {
      currentPiece.shape = oldShape;
    }
  }
}

function clearLines() {
  let linesCleared = 0;
  for (let y = rows - 1; y >= 0; y--) {
    if (playfield[y].every(cell => cell)) {
      playfield.splice(y, 1);
      playfield.unshift(Array(cols).fill(0));
      linesCleared++;
      y++; // recheck same line after shift
    }
  }
  if (linesCleared) {
    score += linesCleared * 100;
    document.getElementById('score').textContent = 'Score: ' + score;
  }
}

function drop() {
  if (!collide(playfield, currentPiece, pos.x, pos.y + 1)) {
    pos.y++;
  } else {
    merge(playfield, currentPiece);
    clearLines();
    currentPiece = nextPiece;
    nextPiece = randomShape();
    pos = { x: 3, y: 0 };
    if (collide(playfield, currentPiece, pos.x, pos.y)) {
      alert('Game Over! Final Score: ' + score);
      playfield.forEach(row => row.fill(0));
      score = 0;
      document.getElementById('score').textContent = 'Score: 0';
    }
  }
}

let gameStarted = false;

function update() {
  if (!gameStarted) return;
  const now = Date.now();
  if (now - lastDrop > dropInterval) {
    drop();
    lastDrop = now;
  }
  drawField();
  requestAnimationFrame(update);
}

function handleKey(e) {
  if (!gameStarted) return;
  if (e.key === 'ArrowLeft') {
    if (!collide(playfield, currentPiece, pos.x - 1, pos.y)) pos.x--;
  } else if (e.key === 'ArrowRight') {
    if (!collide(playfield, currentPiece, pos.x + 1, pos.y)) pos.x++;
  } else if (e.key === 'ArrowDown') {
    drop();
  } else if (e.key === 'ArrowUp') {
    rotatePiece();
  }
}
document.addEventListener('keydown', handleKey);

// Simple Korobeiniki-like music using AudioContext
function playKorobeiniki() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain).connect(audioCtx.destination);
  gain.gain.value = 0.12;
  osc.type = 'triangle';
  osc.start();

  // Note frequency lookup (C major scale, 4th octave and above)
  const NOTE_FREQ = {
    'C0': 16.35, 'C#0': 17.32, 'Db0': 17.32, 'D0': 18.35, 'D#0': 19.45, 'Eb0': 19.45, 'E0': 20.60, 'F0': 21.83, 'F#0': 23.12, 'Gb0': 23.12, 'G0': 24.50, 'G#0': 25.96, 'Ab0': 25.96, 'A0': 27.50, 'A#0': 29.14, 'Bb0': 29.14, 'B0': 30.87,
    'C1': 32.70, 'C#1': 34.65, 'Db1': 34.65, 'D1': 36.71, 'D#1': 38.89, 'Eb1': 38.89, 'E1': 41.20, 'F1': 43.65, 'F#1': 46.25, 'Gb1': 46.25, 'G1': 49.00, 'G#1': 51.91, 'Ab1': 51.91, 'A1': 55.00, 'A#1': 58.27, 'Bb1': 58.27, 'B1': 61.74,
    'C2': 65.41, 'C#2': 69.30, 'Db2': 69.30, 'D2': 73.42, 'D#2': 77.78, 'Eb2': 77.78, 'E2': 82.41, 'F2': 87.31, 'F#2': 92.50, 'Gb2': 92.50, 'G2': 98.00, 'G#2': 103.83, 'Ab2': 103.83, 'A2': 110.00, 'A#2': 116.54, 'Bb2': 116.54, 'B2': 123.47,
    'C3': 130.81, 'C#3': 138.59, 'Db3': 138.59, 'D3': 146.83, 'D#3': 155.56, 'Eb3': 155.56, 'E3': 164.81, 'F3': 174.61, 'F#3': 185.00, 'Gb3': 185.00, 'G3': 196.00, 'G#3': 207.65, 'Ab3': 207.65, 'A3': 220.00, 'A#3': 233.08, 'Bb3': 233.08, 'B3': 246.94,
    'C4': 261.63, 'C#4': 277.18, 'Db4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'Eb4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'Gb4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'Ab4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'Bb4': 466.16, 'B4': 493.88,
    'C5': 523.25, 'C#5': 554.37, 'Db5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'Eb5': 622.25, 'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'Gb5': 739.99, 'G5': 783.99, 'G#5': 830.61, 'Ab5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'Bb5': 932.33, 'B5': 987.77,
    'C6': 1046.50, 'C#6': 1108.73, 'Db6': 1108.73, 'D6': 1174.66, 'D#6': 1244.51, 'Eb6': 1244.51, 'E6': 1318.51, 'F6': 1396.91, 'F#6': 1479.98, 'Gb6': 1479.98, 'G6': 1567.98, 'G#6': 1661.22, 'Ab6': 1661.22, 'A6': 1760.00, 'A#6': 1864.66, 'Bb6': 1864.66, 'B6': 1975.53,
    'C7': 2093.00, 'C#7': 2217.46, 'Db7': 2217.46, 'D7': 2349.32, 'D#7': 2489.02, 'Eb7': 2489.02, 'E7': 2637.02, 'F7': 2793.83, 'F#7': 2959.96, 'Gb7': 2959.96, 'G7': 3135.96, 'G#7': 3322.44, 'Ab7': 3322.44, 'A7': 3520.00, 'A#7': 3729.31, 'Bb7': 3729.31, 'B7': 3951.07,
    'C8': 4186.01, 'C#8': 4434.92, 'Db8': 4434.92, 'D8': 4698.63, 'D#8': 4978.03, 'Eb8': 4978.03, 'E8': 5274.04, 'F8': 5587.65, 'F#8': 5919.91, 'Gb8': 5919.91, 'G8': 6271.93, 'G#8': 6644.88, 'Ab8': 6644.88, 'A8': 7040.00, 'A#8': 7458.62, 'Bb8': 7458.62, 'B8': 7902.13
  };

  // Tune: list of {note, duration} where duration is in whole note units
  // Durations in whole note units.
  const TUNE = [
['E5', 0.5], ['D#5', 0.5], ['E5', 0.5], ['B4', 0.5],
['D5', 0.5], ['C5', 0.5], ['B4', 1.0],
['B4', 0.5], ['C5', 0.5], ['D5', 1.0],
['E5', 0.5], ['C5', 0.5], ['E5', 1.0],
['D5', 0.5], ['C5', 0.5], ['B4', 1.0],
['A4', 0.5], ['B4', 0.5], ['C5', 0.5], ['B4', 0.5],
['A4', 0.5], ['G#4', 0.5], ['A4', 1.0],
['B4', 0.5], ['C5', 0.5], ['D5', 1.0],
['E5', 0.5], ['C5', 0.5], ['E5', 1.0],
['D5', 0.5], ['C5', 0.5], ['B4', 1.0],
['E5', 0.5], ['D#5', 0.5], ['E5', 0.5], ['B4', 0.5],
['D5', 0.5], ['C5', 0.5], ['B4', 1.0],
['B4', 0.5], ['C5', 0.5], ['D5', 1.0],
['E5', 0.5], ['C5', 0.5], ['E5', 1.0],
['D5', 0.5], ['C5', 0.5], ['B4', 1.0]
  ];

  const BASE_TIME = 400; // milliseconds per whole note
  let idx = 0;
  function playNext() {
    const entry = TUNE[idx % TUNE.length];
    const note = entry[0];
    const dur = BASE_TIME * entry[1];
    osc.frequency.setValueAtTime(NOTE_FREQ[note], audioCtx.currentTime);
    idx++;
    setTimeout(playNext, dur);
  }
  playNext();
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (!gameStarted) {
    // reset game state
    playfield.forEach(row => row.fill(0));
    currentPiece = randomShape();
    nextPiece = randomShape();
    pos = { x: 3, y: 0 };
    score = 0;
    document.getElementById('score').textContent = 'Score: 0';
    gameStarted = true;
    lastDrop = Date.now();
    playKorobeiniki();
    update(); // start animation loop
  }
});

update();
  </script>
</body>
</html>
